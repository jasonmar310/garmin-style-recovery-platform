# =============================================================================
# Foundation stack: 3-broker Kafka (KRaft) + TimescaleDB (hot) + MinIO (cold).
# Monitoring & Airflow arrive in later increments behind Compose `profiles`.
#
#   cp .env.example .env      # then edit passwords
#   docker compose up -d
#   make verify               # checks the KRaft quorum
# =============================================================================

# --- Shared Kafka settings (anchored once, merged into each broker) ----------
x-kafka-env: &kafka-env
  KAFKA_PROCESS_ROLES: broker,controller          # KRaft combined mode: no ZooKeeper
  KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:9093,2@kafka2:9093,3@kafka3:9093
  KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
  KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
  # RF=3 / min.insync=2 on the internal topics too — so the cluster's own
  # bookkeeping survives a single broker loss, not just your data topics.
  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
  KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
  KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
  KAFKA_DEFAULT_REPLICATION_FACTOR: 3
  KAFKA_MIN_INSYNC_REPLICAS: 2
  KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0       # faster consumer startup in dev
  CLUSTER_ID: ${CLUSTER_ID}                       # same ID formats all 3 brokers

x-kafka-common: &kafka-common
  image: confluentinc/cp-kafka:7.6.0
  healthcheck:
    # Broker is "healthy" only once it answers an API call on its own listener.
    test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
    interval: 10s
    timeout: 10s
    retries: 12
    start_period: 25s
  networks: [telemetry]
  restart: unless-stopped

# --- Shared Airflow settings (LocalExecutor, behind the `airflow` profile) ---
x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
  AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
  # DAGs install these at container start (prod would bake a custom image):
  _PIP_ADDITIONAL_REQUIREMENTS: psycopg2-binary boto3 pyarrow pyyaml
  # how DAGs reach the telemetry stores — IN-NETWORK names + INTERNAL ports
  # (note: timescaledb:5432, NOT the host's 5433 — that mapping is host-only):
  PGHOST: timescaledb
  PGPORT: "5432"
  TIMESCALE_DB: ${TIMESCALE_DB}
  TIMESCALE_USER: ${TIMESCALE_USER}
  TIMESCALE_PASSWORD: ${TIMESCALE_PASSWORD}
  S3_ENDPOINT: http://minio:9000
  MINIO_ROOT_USER: ${MINIO_ROOT_USER}
  MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

x-airflow-common: &airflow-common
  image: apache/airflow:2.10.5
  environment: *airflow-env
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./metadata:/opt/airflow/metadata:ro       # DAG factory reads streams.yaml
  user: "${AIRFLOW_UID:-50000}:0"
  networks: [telemetry]
  profiles: [airflow]

services:
  # --- Kafka brokers ---------------------------------------------------------
  # Two listeners per broker:
  #   PLAINTEXT (9092)  -> in-network clients use the container name (kafka1:9092)
  #   EXTERNAL  (29092) -> host tools use localhost:<published port>
  # advertised.listeners must hand the client back the address IT can reach,
  # which is why EXTERNAL advertises localhost:<unique host port> per broker.
  kafka1:
    <<: *kafka-common
    hostname: kafka1
    container_name: kafka1
    ports: ["29092:29092"]
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: 1
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka1:9092,EXTERNAL://localhost:29092
    volumes: ["kafka1-data:/var/lib/kafka/data"]

  kafka2:
    <<: *kafka-common
    hostname: kafka2
    container_name: kafka2
    ports: ["29093:29092"]              # host 29093 -> container 29092
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: 2
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka2:9092,EXTERNAL://localhost:29093
    volumes: ["kafka2-data:/var/lib/kafka/data"]

  kafka3:
    <<: *kafka-common
    hostname: kafka3
    container_name: kafka3
    ports: ["29094:29092"]              # host 29094 -> container 29092
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: 3
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka3:9092,EXTERNAL://localhost:29094
    volumes: ["kafka3-data:/var/lib/kafka/data"]

  # --- TimescaleDB: hot tier (relational, time-series) -----------------------
  timescaledb:
    image: timescale/timescaledb:2.15.3-pg16
    container_name: timescaledb
    environment:
      POSTGRES_DB: ${TIMESCALE_DB}
      POSTGRES_USER: ${TIMESCALE_USER}
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD}
    ports: ["5433:5432"]
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro     # *.sql here auto-runs on FIRST boot only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks: [telemetry]
    restart: unless-stopped

  # --- MinIO: cold tier (S3-compatible object storage) -----------------------
  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"     # S3 API
      - "9001:9001"     # web console
    volumes: ["minio-data:/data"]
    healthcheck:
      # Uses bundled `mc`; if your image lacks it, swap for the
      # http://localhost:9000/minio/health/live endpoint.
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks: [telemetry]
    restart: unless-stopped

  # One-shot: create the cold-tier bucket once MinIO is healthy, then exit.
  minio-setup:
    image: minio/mc:RELEASE.2024-06-12T14-34-03Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/telemetry &&
      mc ilm rule add --expire-days 90 local/telemetry || mc ilm add --expiry-days 90 local/telemetry || true &&
      echo 'cold-tier bucket ready (lifecycle: expire raw after 90d): local/telemetry'
      "
    networks: [telemetry]
    restart: "no"

  # --- Airflow: medallion + DQ orchestration (`docker compose --profile airflow up -d`)
  # Its own metadata Postgres, kept separate from the telemetry TimescaleDB.
  airflow-postgres:
    image: postgres:13
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes: ["airflow-db:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks: [telemetry]
    profiles: [airflow]

  # One-shot: run DB migrations + create the admin user, then exit.
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create --role Admin \
          --username "${AIRFLOW_ADMIN_USER:-admin}" \
          --password "${AIRFLOW_ADMIN_PASSWORD:-admin}" \
          --firstname admin --lastname user --email admin@example.com || true
    depends_on:
      airflow-postgres:
        condition: service_healthy
    restart: "no"

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    depends_on:
      airflow-postgres: { condition: service_healthy }
      airflow-init: { condition: service_completed_successfully }
    restart: unless-stopped

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports: ["${AIRFLOW_PORT:-8080}:8080"]
    depends_on:
      airflow-postgres: { condition: service_healthy }
      airflow-init: { condition: service_completed_successfully }
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 6
    restart: unless-stopped

  # --- Monitoring: Prometheus + Grafana + exporters (`--profile monitoring`) --
  # Each exporter turns one system's internals into Prometheus metrics.
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./monitoring/prometheus:/etc/prometheus:ro
      - prometheus-data:/prometheus
    ports: ["${PROMETHEUS_PORT:-9090}:9090"]
    networks: [telemetry]
    profiles: [monitoring]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports: ["${GRAFANA_PORT:-3000}:3000"]
    depends_on: [prometheus]
    networks: [telemetry]
    profiles: [monitoring]
    restart: unless-stopped

  # Kafka -> consumer lag, under-replicated partitions, broker count.
  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    container_name: kafka-exporter
    command:
      - --kafka.server=kafka1:9092
      - --kafka.server=kafka2:9092
      - --kafka.server=kafka3:9092
    ports: ["9308:9308"]
    networks: [telemetry]
    profiles: [monitoring]
    restart: unless-stopped

  # Host CPU / memory / disk / network.
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    ports: ["9100:9100"]
    networks: [telemetry]
    profiles: [monitoring]
    restart: unless-stopped

  # TimescaleDB connections / transactions / locks (backpressure signals).
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${TIMESCALE_USER}:${TIMESCALE_PASSWORD}@timescaledb:5432/${TIMESCALE_DB}?sslmode=disable"
      PG_EXPORTER_EXTEND_QUERY_PATH: /etc/pg_exporter/queries.yaml
    volumes:
      - ./monitoring/postgres-exporter/queries.yaml:/etc/pg_exporter/queries.yaml:ro
    ports: ["9187:9187"]
    networks: [telemetry]
    profiles: [monitoring]
    restart: unless-stopped

  # --- PgBouncer: connection pooler in front of TimescaleDB (`--profile pgbouncer`)
  # Demo for scenario-1 scale-out: many router instances each hold a DB connection;
  # at scale that approaches max_connections. PgBouncer in TRANSACTION mode reuses
  # a small set of real backend connections across many idle clients (the router
  # is busy only during flushes). Point the router at it with PGPORT=6432.
  pgbouncer:
    image: edoburu/pgbouncer:1.22.1-p0
    container_name: pgbouncer
    environment:
      DB_HOST: timescaledb
      DB_PORT: "5432"
      DB_USER: ${TIMESCALE_USER}
      DB_PASSWORD: ${TIMESCALE_PASSWORD}
      DB_NAME: ${TIMESCALE_DB}
      POOL_MODE: transaction          # reuse backends between transactions
      MAX_CLIENT_CONN: "200"          # how many clients PgBouncer accepts
      DEFAULT_POOL_SIZE: "5"          # real backend connections to Postgres
      AUTH_TYPE: scram-sha-256        # match pg16 default
    ports: ["6432:6432"]
    depends_on: [timescaledb]
    networks: [telemetry]
    profiles: [pgbouncer]
    restart: unless-stopped

networks:
  telemetry:
    driver: bridge

volumes:
  kafka1-data:
  kafka2-data:
  kafka3-data:
  timescale-data:
  minio-data:
  airflow-db:
  prometheus-data:
  grafana-data: